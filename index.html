<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Sports Mystery</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Arial Rounded MT Bold', sans-serif; background-color: #000; color: white; }
        #bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://raw.githubusercontent.com/marionbunyi/sports-warm-up/main/backgroundphoto.jpg'); background-size: cover; background-position: center; opacity: 0.2; z-index: -1; }
        #nav-bar { position: sticky; top: 0; width: 100%; height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; background: rgba(0,0,0,0.9); border-bottom: 3px solid #FBD000; z-index: 1000; }
        
        /* Updated Nav Layout */
        .nav-center { display: flex; align-items: center; gap: 15px; }
        
        #timer-display { font-size: 20px; color: #FBD000; font-weight: bold; }
        .btn-nav { background: #43ad2e; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #main-container { display: flex; flex-direction: column; padding: 15px; gap: 15px; max-width: 1400px; margin: 0 auto; height: calc(100vh - 60px); }
        @media (min-width: 900px) { #main-container { flex-direction: row; align-items: stretch; } #photo-section { flex: 1.6; } #control-panel { flex: 1; } }
        #photo-section { width: 100%; aspect-ratio: 4/3; border: 6px solid #FBD000; border-radius: 25px; position: relative; background-color: #111; background-size: cover; background-position: center; overflow: hidden; cursor: default; }
        .hidden-letter { position: absolute; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.25); font-weight: bold; cursor: pointer; transform: translate(-50%, -50%); font-size: 24px; z-index: 5; }
        .hint-flash { background: #FBD000 !important; color: black !important; border-radius: 50%; border: 3px solid white !important; transform: translate(-50%, -50%) scale(1.8) !important; z-index: 100 !important; }
        #control-panel { display: flex; flex-direction: column; gap: 10px; }
        .stats-row { display: flex; justify-content: space-between; align-items: center; padding: 0 15px; background: rgba(255,255,255,0.1); border-radius: 12px; height: 50px; }
        .card { background: rgba(0,0,0,0.85); border: 3px solid #FBD000; border-radius: 20px; padding: 10px; text-align: center; display: flex; align-items: center; justify-content: center; flex: 1; }
        #letter-bank { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; }
        .bank-letter { width: 42px; height: 48px; background: #E52521; border: 2px solid #fff; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; cursor: pointer; box-shadow: 0 3px 0 #8b120f; }
        #answer-zone { display: inline-flex; gap: 4px; }
        .slot { width: 40px; height: 50px; border: 2px solid #FBD000; border-radius: 8px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; color: #FBD000; font-weight: bold; font-size: 22px; }
        #check-btn { width: 100%; padding: 15px; background: #43ad2e; color: white; border: none; border-radius: 15px; font-size: 20px; font-weight: bold; box-shadow: 0 5px 0 #2d7a1f; cursor: pointer; }
        #clue-img { max-height: 120px; border-radius: 10px; display: none; }
        .flash-msg { font-size: 70px; font-weight: 900; margin: 10px; }
        .hands-up { font-size: 80px; color: #FBD000; font-weight: 900; margin: 20px 0; }
        
        /* Updated Top Button Styles */
        .top-btn { background: none; border: 1px solid #FBD000; color: #FBD000; border-radius: 5px; cursor: pointer; padding: 2px 8px; font-size: 18px; }

        #settings-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 4000; justify-content: center; align-items: center; padding: 10px; }
        .modal-content { background: #1a1a1a; padding: 25px; border: 2px solid #FBD000; border-radius: 20px; width: 95%; max-width: 900px; max-height: 90vh; display: flex; flex-direction: column; }
        #settings-list { overflow-y: auto; margin-bottom: 20px; }
        .setting-row { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; background: #2a2a2a; padding: 12px; border-radius: 10px; border: 1px solid #444; }
        .setting-row input[type="text"] { background: #111; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 5px; flex: 1; min-width: 80px; }
        .preview-box { display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 10px; color: #FBD000; }
        .preview-thumb { width: 50px; height: 50px; border-radius: 5px; object-fit: cover; background: #111; border: 1px solid #444; }
        .upload-btn { background: #444; color: white; padding: 6px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; text-align: center; }
        .upload-btn:hover { background: #555; }
        .hidden-file { display: none; }
        .btn-add { background: #FBD000; color: #000; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 15px; }
        .btn-del { background: #E52521; color: #fff; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
        #start-overlay, #win-overlay, #gameover-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.95); text-align: center; }
        .wrong-flash { animation: wrongFlash 0.4s ease; }
        @keyframes wrongFlash { 0% { background-color: rgba(255,0,0,0); } 25% { background-color: rgba(255,0,0,0.5); } 50% { background-color: rgba(255,255,255,0.2); } 100% { background-color: rgba(255,0,0,0); } }
    </style>
</head>

<body>

<div id="bg-layer"></div>

<audio id="bg-music" loop src="https://raw.githubusercontent.com/marionbunyi/sports-warm-up/e3ac7bdb78353c660ee19b6b1e5585e7763c2350/Energetic%20Rock%20Background%20Music%20For%20Sports%20%26%20Workout%20Videos.mp3"></audio>
<audio id="snd-win" src="https://raw.githubusercontent.com/marionbunyi/sports-mario/main/Correct%20answer%20sound%20effect%20_%20No%20copyright.mp3"></audio>
<audio id="snd-wrong" src="https://raw.githubusercontent.com/marionbunyi/sports-mario/main/Wrong%20Buzzer%20Sound%20Effect.mp3"></audio>

<div id="start-overlay">
    <h1 style="font-size: 50px; color: #FBD000;">SPORTS MYSTERY</h1>
    <p style="font-size: 20px;">Find the letters! You only have 5 extra clicks allowed.</p>
    <button id="check-btn" style="width: 250px;" onclick="startGame()">START GAME</button>
</div>

<div id="nav-bar">
    <button class="btn-nav" onclick="changeRound(-1)">BACK</button>
    <div class="nav-center">
        <button class="top-btn" onclick="toggleSettings()">⚙️</button>
        <div id="timer-display">00:00</div>
        <button class="top-btn" onclick="init()">🔄</button>
    </div>
    <button class="btn-nav" onclick="changeRound(1)">NEXT</button>
</div>

<div id="main-container">
    <div id="photo-section" onclick="countPhotoClick()"></div>
    <div id="control-panel">
        <div class="stats-row">
            <div style="color: #FBD000; font-size: 18px;">MISSES: <span id="click-count">0/5</span></div>
            <div style="color: #43ad2e; font-size: 18px;">FOUND: <span id="found-count">0/0</span></div>
            <div id="secret-hint-btn" onclick="showHints()">?</div>
        </div>
        <div class="card" id="clue-card" style="min-height: 140px;">
            <div id="lock-msg" style="color: #666; font-size: 18px;">Find letters to unlock clue</div>
            <img id="clue-img" src="">
        </div>
        <div class="card" id="bank-card"><div id="letter-bank"></div></div>
        <button id="check-btn" onclick="checkAnswer()">CHECK ANSWER</button>
        <div class="card" id="answer-card" style="min-height: 90px;"><div id="answer-zone"></div></div>
    </div>
</div>

<div id="settings-modal">
    <div class="modal-content">
        <h2 style="color: #FBD000; margin-top: 0;">Vocabulary Editor</h2>
        <button class="btn-add" onclick="addNewEntry()">+ Add New Word</button>
        <div id="settings-list"></div>
        <div style="display: flex; gap: 10px;">
            <button class="btn-nav" style="flex:1" onclick="saveSettings()">SAVE & RESTART</button>
            <button class="btn-nav" style="flex:1; background:#666;" onclick="toggleSettings()">CANCEL</button>
        </div>
    </div>
</div>

<div id="win-overlay" style="display:none;">
    <h1 class="flash-msg" style="color: #43ad2e;">CORRECT!</h1>
    <div class="hands-up">HANDS UP!</div>
    <div id="final-time" style="font-size: 32px; color: white; margin-bottom: 20px;"></div>
    <button class="btn-nav" style="padding: 15px 50px; font-size: 24px;" onclick="changeRound(1)">NEXT LEVEL</button>
</div>

<div id="gameover-overlay" style="display:none;">
    <h1 class="flash-msg" style="color: #E52521;">GAME OVER</h1>
    <p style="font-size: 24px;">Too many clicks! Try the next one.</p>
    <button class="btn-nav" style="padding: 15px 50px; font-size: 24px; margin-top: 20px;" onclick="changeRound(1)">NEXT ROUND</button>
</div>

<script>
    const defaultSports = [
        { name: "BASKETBALL", img: "basketball", clue: "" },
        { name: "TENNIS", img: "tennis", clue: "" }
    ];

    let sports = JSON.parse(localStorage.getItem('mysteryGameData')) || defaultSports;
    let currentIdx = 0;
    let found = [];
    let startTime;
    let timerRef;
    let misses = 0;
    const maxMisses = 5;

    function startGame() {
        document.getElementById('start-overlay').style.display = 'none';
        const music = document.getElementById('bg-music');
        music.volume = 0.3;
        music.play().catch(() => {});
        init();
    }

    function init() {
        const s = sports[currentIdx];
        found = []; misses = 0;
        clearInterval(timerRef);
        startTime = Date.now();
        timerRef = setInterval(updateTimer, 1000);

        const pic = document.getElementById('photo-section');
        pic.innerHTML = '';
        
        let bgUrl = s.img.startsWith('data') || s.img.startsWith('http') ? s.img : `https://raw.githubusercontent.com/marionbunyi/sports-mario/main/hidden%20${s.img}.png`;
        let clueUrl = (s.clue && (s.clue.startsWith('data') || s.clue.startsWith('http'))) ? s.clue : `https://raw.githubusercontent.com/marionbunyi/sports-mario/main/${s.img}%20clue.png`;

        pic.style.backgroundImage = `url('${bgUrl}')`;
        spawnLetters(s.name);
        updateUI();

        document.getElementById('win-overlay').style.display = 'none';
        document.getElementById('gameover-overlay').style.display = 'none';
        document.getElementById('clue-img').src = clueUrl;
        document.getElementById('clue-img').style.display = 'none';
        document.getElementById('lock-msg').style.display = 'block';

        const zone = document.getElementById('answer-zone');
        zone.innerHTML = '';
        s.name.split('').forEach(() => {
            let sl = document.createElement('div');
            sl.className = 'slot';
            sl.onclick = function() {
                if (this.innerText) {
                    let item = found.find(f => f.char === this.innerText && f.used);
                    if (item) { item.used = false; this.innerText = ''; renderBank(); }
                }
            };
            zone.appendChild(sl);
        });
    }

    function spawnLetters(name) {
        const pic = document.getElementById('photo-section');
        name.split('').forEach(char => {
            let l = document.createElement('div');
            l.className = 'hidden-letter';
            l.innerText = char;
            l.style.top = (Math.random() * 70 + 15) + "%";
            l.style.left = (Math.random() * 70 + 15) + "%";
            l.onclick = (e) => {
                e.stopPropagation();
                l.style.display = 'none';
                found.push({ char, used: false });
                if (found.length === name.length) {
                    document.getElementById('lock-msg').style.display = 'none';
                    document.getElementById('clue-img').style.display = 'block';
                }
                renderBank();
                updateUI();
            };
            pic.appendChild(l);
        });
    }

    function countPhotoClick() {
        misses++;
        updateUI();
        document.getElementById('snd-wrong').play();
        document.body.classList.add('wrong-flash');
        setTimeout(() => { document.body.classList.remove('wrong-flash'); }, 400);
        if (misses >= maxMisses) {
            clearInterval(timerRef);
            document.getElementById('gameover-overlay').style.display = 'flex';
        }
    }

    function updateUI() {
        document.getElementById('click-count').innerText = `${misses}/${maxMisses}`;
        document.getElementById('found-count').innerText = `${found.length}/${sports[currentIdx].name.length}`;
    }

    function updateTimer() {
        let elapsed = Math.floor((Date.now() - startTime) / 1000);
        let m = Math.floor(elapsed / 60).toString().padStart(2, '0');
        let s = (elapsed % 60).toString().padStart(2, '0');
        document.getElementById('timer-display').innerText = `${m}:${s}`;
    }

    function renderBank() {
        const b = document.getElementById('letter-bank');
        b.innerHTML = '';
        found.forEach(item => {
            if (!item.used) {
                let div = document.createElement('div');
                div.className = 'bank-letter';
                div.innerText = item.char;
                div.onclick = () => {
                    let empty = [...document.querySelectorAll('.slot')].find(s => !s.innerText);
                    if (empty) { empty.innerText = item.char; item.used = true; renderBank(); }
                };
                b.appendChild(div);
            }
        });
    }

    function checkAnswer() {
        let guess = [...document.querySelectorAll('.slot')].map(s => s.innerText).join('');
        if (guess === sports[currentIdx].name) {
            clearInterval(timerRef);
            document.getElementById('snd-win').play();
            document.getElementById('final-time').innerText = `TIME: ${document.getElementById('timer-display').innerText}`;
            document.getElementById('win-overlay').style.display = 'flex';
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        } else {
            document.getElementById('snd-wrong').play();
            document.body.classList.add('wrong-flash');
            setTimeout(() => { document.body.classList.remove('wrong-flash'); }, 400);
        }
    }

    function changeRound(dir) {
        currentIdx = (currentIdx + dir + sports.length) % sports.length;
        init();
    }

    function toggleSettings() {
        const modal = document.getElementById('settings-modal');
        const visible = modal.style.display === 'flex';
        modal.style.display = visible ? 'none' : 'flex';
        if (!visible) renderSettingsList();
    }

    function renderSettingsList() {
        const list = document.getElementById('settings-list');
        list.innerHTML = '';
        sports.forEach((item, index) => {
            const row = document.createElement('div');
            row.className = 'setting-row';
            
            let mainPrev = item.img.startsWith('data') || item.img.startsWith('http') ? item.img : `https://raw.githubusercontent.com/marionbunyi/sports-mario/main/hidden%20${item.img}.png`;
            let cluePrev = (item.clue && (item.clue.startsWith('data') || item.clue.startsWith('http'))) ? item.clue : `https://raw.githubusercontent.com/marionbunyi/sports-mario/main/${item.img}%20clue.png`;

            row.innerHTML = `
                <input type="text" value="${item.name}" placeholder="Word" onchange="sports[${index}].name = this.value.toUpperCase()">
                
                <div class="preview-box">
                    <img src="${mainPrev}" class="preview-thumb" id="bg-prev-${index}">
                    <label class="upload-btn" for="bg-file-${index}">Main Pic</label>
                    <input type="file" id="bg-file-${index}" class="hidden-file" accept="image/*" onchange="uploadImage(this, ${index}, 'img')">
                </div>

                <div class="preview-box">
                    <img src="${cluePrev}" class="preview-thumb" id="clue-prev-${index}">
                    <label class="upload-btn" for="clue-file-${index}">Clue Pic</label>
                    <input type="file" id="clue-file-${index}" class="hidden-file" accept="image/*" onchange="uploadImage(this, ${index}, 'clue')">
                </div>

                <button class="btn-del" onclick="sports.splice(${index},1); renderSettingsList()">🗑️</button>
            `;
            list.appendChild(row);
        });
    }

    function uploadImage(input, index, key) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                sports[index][key] = e.target.result;
                const prevId = key === 'img' ? `bg-prev-${index}` : `clue-prev-${index}`;
                document.getElementById(prevId).src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function addNewEntry() {
        sports.push({ name: "NEW", img: "basketball", clue: "" });
        renderSettingsList();
    }

    function saveSettings() {
        localStorage.setItem('mysteryGameData', JSON.stringify(sports));
        toggleSettings();
        currentIdx = 0;
        init();
    }

    function showHints() {
        document.querySelectorAll('.hidden-letter').forEach(l => {
            l.classList.add('hint-flash');
            setTimeout(() => { l.classList.remove('hint-flash'); }, 2000);
        });
    }
</script>

</body>
</html>
